# Keybindings
# ALT for workspace navigation, ALT+SHIFT to move windows
# SUPER is reserved for app launcher
# CTRL+ALT for system-level actions (lock, power, exit)

$scriptsDir = $HOME/.config/hypr/scripts
$UserConfigs = $HOME/.config/hypr/UserConfigs

# Load user defaults ($term, $files, $Search_Engine etc.)
source = $UserConfigs/01-UserDefaults.conf

# ===== App launcher / terminal / file manager =====
bind = SUPER, Space, exec, pkill rofi || true && rofi -show drun -modi drun,run,window
bind = ALT, Return, exec, $term
bind = SUPER, E, exec, $files

# ===== Window switcher (searchable across all workspaces) =====
bind = ALT CTRL, S, exec, rofi -show window

# ===== Window management =====
bind = ALT, X, killactive,
bind = ALT SHIFT, F, fullscreen,
bind = ALT CTRL, F, fullscreen, 1
bind = ALT SHIFT, Space, togglefloating,

# ===== Focus =====
bind = ALT, H, movefocus, l
bind = ALT, L, movefocus, r
bind = ALT, K, movefocus, u
bind = ALT, J, movefocus, d
bind = ALT, left, movefocus, l
bind = ALT, right, movefocus, r
bind = ALT, up, movefocus, u
bind = ALT, down, movefocus, d

# ===== Move windows =====
bind = ALT SHIFT, H, movewindow, l
bind = ALT SHIFT, L, movewindow, r
bind = ALT SHIFT, K, movewindow, u
bind = ALT SHIFT, J, movewindow, d
bind = ALT SHIFT, left, movewindow, l
bind = ALT SHIFT, right, movewindow, r
bind = ALT SHIFT, up, movewindow, u
bind = ALT SHIFT, down, movewindow, d

# ===== Resize =====
binde = ALT SHIFT, minus, resizeactive, -50 0
binde = ALT SHIFT, equal, resizeactive, 50 0

# ===== Layout =====
bind = ALT, slash, layoutmsg, togglesplit  # toggle dwindle split direction

# ===== Mouse move/resize =====
bindm = ALT, mouse:272, movewindow
bindm = ALT, mouse:273, resizewindow

# ===== Window cycling =====
bind = ALT, Tab, cyclenext,
bind = ALT, Tab, bringactivetotop,

# ===== Workspace navigation — numbered =====
bind = ALT, 1, workspace, 1
bind = ALT, 2, workspace, 2
bind = ALT, 3, workspace, 3
bind = ALT, 4, workspace, 4
bind = ALT, 5, workspace, 5
bind = ALT, 6, workspace, 6
bind = ALT, 7, workspace, 7
bind = ALT, 8, workspace, 8
bind = ALT, 9, workspace, 9

# ===== Workspace navigation — named =====
bind = ALT, A, workspace, name:A
bind = ALT, B, workspace, name:B
bind = ALT, C, workspace, name:C
bind = ALT, D, workspace, name:D
bind = ALT, E, workspace, name:E
bind = ALT, F, workspace, name:F
bind = ALT, G, workspace, name:G
bind = ALT, I, workspace, name:I
bind = ALT, M, workspace, name:M
bind = ALT, N, workspace, name:N
bind = ALT, O, workspace, name:O
bind = ALT, P, workspace, name:P
bind = ALT, Q, workspace, name:Q
bind = ALT, R, workspace, name:R
bind = ALT, S, workspace, name:S
bind = ALT, T, workspace, name:T
bind = ALT, U, workspace, name:U
bind = ALT, V, workspace, name:V
bind = ALT, W, workspace, name:W
bind = ALT, Y, workspace, name:Y
bind = ALT, Z, workspace, name:Z

# ===== Move window to workspace — numbered =====
bind = ALT SHIFT, 1, movetoworkspace, 1
bind = ALT SHIFT, 2, movetoworkspace, 2
bind = ALT SHIFT, 3, movetoworkspace, 3
bind = ALT SHIFT, 4, movetoworkspace, 4
bind = ALT SHIFT, 5, movetoworkspace, 5
bind = ALT SHIFT, 6, movetoworkspace, 6
bind = ALT SHIFT, 7, movetoworkspace, 7
bind = ALT SHIFT, 8, movetoworkspace, 8
bind = ALT SHIFT, 9, movetoworkspace, 9

# ===== Move window to workspace — named =====
bind = ALT SHIFT, A, movetoworkspace, name:A
bind = ALT SHIFT, B, movetoworkspace, name:B
bind = ALT SHIFT, C, movetoworkspace, name:C
bind = ALT SHIFT, D, movetoworkspace, name:D
bind = ALT SHIFT, E, movetoworkspace, name:E
bind = ALT SHIFT, G, movetoworkspace, name:G
bind = ALT SHIFT, I, movetoworkspace, name:I
bind = ALT SHIFT, M, movetoworkspace, name:M
bind = ALT SHIFT, N, movetoworkspace, name:N
bind = ALT SHIFT, O, movetoworkspace, name:O
bind = ALT SHIFT, P, movetoworkspace, name:P
bind = ALT SHIFT, Q, movetoworkspace, name:Q
bind = ALT SHIFT, R, movetoworkspace, name:R
bind = ALT SHIFT, S, movetoworkspace, name:S
bind = ALT SHIFT, T, movetoworkspace, name:T
bind = ALT SHIFT, U, movetoworkspace, name:U
bind = ALT SHIFT, V, movetoworkspace, name:V
bind = ALT SHIFT, W, movetoworkspace, name:W
bind = ALT SHIFT, Y, movetoworkspace, name:Y
bind = ALT SHIFT, Z, movetoworkspace, name:Z

# ===== Recent workspace =====
bind = ALT CTRL, bracketleft, workspace, previous

# ===== Move workspace to monitor =====
bind = ALT SHIFT CTRL, A, movecurrentworkspacetomonitor, l
bind = ALT SHIFT CTRL, F, movecurrentworkspacetomonitor, r
bind = ALT SHIFT CTRL, D, movecurrentworkspacetomonitor, u
bind = ALT SHIFT CTRL, S, movecurrentworkspacetomonitor, d

# ===== System =====
bind = CTRL ALT, Delete, exec, hyprctl dispatch exit 0
bind = CTRL ALT, L, exec, $scriptsDir/LockScreen.sh
bind = CTRL ALT, P, exec, $scriptsDir/Wlogout.sh
bind = ALT SHIFT, N, exec, swaync-client -t -sw        # notification panel
bind = ALT CTRL, V, exec, $scriptsDir/ClipManager.sh   # clipboard history
bind = ALT CTRL, N, exec, $scriptsDir/Hyprsunset.sh toggle  # night light
bind = ALT CTRL, B, exec, pkill -SIGUSR1 waybar         # toggle waybar
bind = ALT CTRL, T, exec, $term -e btop                 # task manager

# ===== Screenshots =====
bind = ALT, Print, exec, $scriptsDir/ScreenShot.sh --now
bind = ALT SHIFT, Print, exec, $scriptsDir/ScreenShot.sh --area
bind = ALT SHIFT, S, exec, $scriptsDir/ScreenShot.sh --swappy

# ===== Media keys =====
bindel = , xf86audioraisevolume, exec, $scriptsDir/Volume.sh --inc
bindel = , xf86audiolowervolume, exec, $scriptsDir/Volume.sh --dec
bindl  = , xf86AudioMicMute,     exec, $scriptsDir/Volume.sh --toggle-mic
bindl  = , xf86audiomute,        exec, $scriptsDir/Volume.sh --toggle
bindl  = , xf86Sleep,            exec, systemctl suspend
bindl  = , xf86AudioPlayPause,   exec, $scriptsDir/MediaCtrl.sh --pause
bindl  = , xf86AudioPause,       exec, $scriptsDir/MediaCtrl.sh --pause
bindl  = , xf86AudioPlay,        exec, $scriptsDir/MediaCtrl.sh --pause
bindl  = , xf86AudioNext,        exec, $scriptsDir/MediaCtrl.sh --nxt
bindl  = , xf86AudioPrev,        exec, $scriptsDir/MediaCtrl.sh --prv
bindl  = , xf86audiostop,        exec, $scriptsDir/MediaCtrl.sh --stop
