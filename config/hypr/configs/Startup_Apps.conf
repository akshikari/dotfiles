# Startup applications
$scriptsDir = $HOME/.config/hypr/scripts

# Essential: wire up Wayland env vars for portals, screen sharing, etc.
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# Authentication agent (needed for sudo prompts in GUI apps)
exec-once = $scriptsDir/Polkit.sh

# Keyring (for Chrome, SSH agent, Git credentials)
exec-once = /usr/bin/gnome-keyring-daemon --start --components=secrets

# System tray
exec-once = nm-applet --indicator
exec-once = blueman-applet

# Notifications
exec-once = swaync

# Status bar
exec-once = waybar

# Idle management / lock screen
exec-once = hypridle

# Night light (initialises to off; toggle with ALT+CTRL+N)
exec-once = $scriptsDir/Hyprsunset.sh init

# Clipboard history
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
