# Catppuccin Frappé lock screen

# Background on both monitors
background {
    monitor = DP-1
    color = rgba(48, 52, 70, 1.0)
}

background {
    monitor = HDMI-A-1
    color = rgba(48, 52, 70, 1.0)
}

# Clock — on main monitor (AOC DP-1)
label {
    monitor = DP-1
    text     = cmd[update:1000] echo "$(date +"%H:%M")"
    color    = rgba(198, 208, 245, 1.0)
    font_size   = 72
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, 200
    halign   = center
    valign   = center
}

# Date — on main monitor (AOC DP-1)
label {
    monitor = DP-1
    text     = cmd[update:60000] echo "$(date +"%A, %B %d")"
    color    = rgba(165, 173, 206, 1.0)
    font_size   = 20
    font_family = JetBrainsMono Nerd Font
    position = 0, 120
    halign   = center
    valign   = center
}

# Password input — on main monitor (AOC DP-1)
input-field {
    monitor = DP-1
    size             = 320, 52
    outline_thickness = 2
    dots_size        = 0.25
    dots_spacing     = 0.6
    dots_center      = true
    outer_color      = rgba(140, 170, 238, 1.0)
    inner_color      = rgba(65, 69, 89, 1.0)
    font_color       = rgba(198, 208, 245, 1.0)
    fade_on_empty    = true
    placeholder_text = <i>Password</i>
    check_color      = rgba(166, 209, 137, 1.0)
    fail_color       = rgba(231, 130, 132, 1.0)
    fail_text        = <i>$FAIL ($ATTEMPTS)</i>
    rounding         = 6
    position         = 0, -60
    halign           = center
    valign           = center
}
