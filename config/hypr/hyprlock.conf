# Catppuccin Frappé lock screen

background {
    monitor =
    color = rgba(48, 52, 70, 1.0)   # Frappé base #303446
}

# Clock
label {
    monitor =
    text     = cmd[update:1000] echo "$(date +"%H:%M")"
    color    = rgba(198, 208, 245, 1.0)   # text
    font_size   = 72
    font_family = JetBrains Mono Bold
    position = 0, 200
    halign   = center
    valign   = center
}

# Date
label {
    monitor =
    text     = cmd[update:60000] echo "$(date +"%A, %B %d")"
    color    = rgba(165, 173, 206, 1.0)   # subtext0
    font_size   = 20
    font_family = JetBrains Mono
    position = 0, 120
    halign   = center
    valign   = center
}

# Password input
input-field {
    monitor =
    size             = 320, 52
    outline_thickness = 2
    dots_size        = 0.25
    dots_spacing     = 0.6
    dots_center      = true
    outer_color      = rgba(140, 170, 238, 1.0)   # blue
    inner_color      = rgba(65, 69, 89, 1.0)       # surface0
    font_color       = rgba(198, 208, 245, 1.0)    # text
    fade_on_empty    = true
    placeholder_text = <i>Password</i>
    check_color      = rgba(166, 209, 137, 1.0)    # green
    fail_color       = rgba(231, 130, 132, 1.0)    # red
    fail_text        = <i>$FAIL ($ATTEMPTS)</i>
    rounding         = 6
    position         = 0, -60
    halign           = center
    valign           = center
}
