# =============================================================================
# Monitors
# DP-1     = AOC AG49 (5120x1440) — primary, physical bottom
# HDMI-A-1 = LG (2560x1080)      — physical top, centered over AOC: (5120-2560)/2 = 1280
# Adjust @hz if needed for your refresh rates
# =============================================================================
monitor=DP-1,5120x1440@120,0x1080,1
monitor=HDMI-A-1,2560x1080@60,1280x0,1

# =============================================================================
# Autostart
# =============================================================================
exec-once = waybar
exec-once = dunst
exec-once = hypridle
exec-once = nm-applet --indicator
exec-once = blueman-applet
exec-once = /usr/lib/policykit-1-gnome/polkit-gnome-authentication-agent-1
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# =============================================================================
# Environment
# =============================================================================
env = XCURSOR_SIZE,24
env = XCURSOR_THEME,Adwaita
env = QT_QPA_PLATFORM,wayland
env = QT_QPA_PLATFORMTHEME,gnome
env = MOZ_ENABLE_WAYLAND,1
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

# NVIDIA — required for GTX 1080 Ti (GP102)
# See https://wiki.hyprland.org/Nvidia/
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = NVD_BACKEND,direct
env = GSK_RENDERER,ngl
env = WLR_NO_HARDWARE_CURSORS,1
# Note: GBM_BACKEND=nvidia-drm is sometimes needed but causes issues on some setups.
# Only uncomment if you get a black screen on launch.
#env = GBM_BACKEND,nvidia-drm

# =============================================================================
# Input
# =============================================================================
input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0
}

# =============================================================================
# General
# =============================================================================
general {
    gaps_in = 2
    gaps_out = 2
    border_size = 2
    col.active_border   = rgba(e1e3e4ff)
    col.inactive_border = rgba(494d64ff)
    layout = dwindle
}

# =============================================================================
# Appearance
# =============================================================================
decoration {
    rounding = 4
    blur {
        enabled = false
    }
    shadow {
        enabled = false
    }
}

animations {
    enabled = false
}

# =============================================================================
# Layout
# dwindle is closest to AeroSpace's tiles — auto-splits and respects direction
# =============================================================================
dwindle {
    preserve_split = true
    smart_split    = false
}

# =============================================================================
# Misc
# =============================================================================
misc {
    force_default_wallpaper  = 0
    disable_hyprland_logo    = true
    disable_splash_rendering = true
    # VFR: reduce GPU usage when nothing is moving — fixes progressive lag on NVIDIA
    vfr = true
}

# NVIDIA cursor fix — hardware cursors are broken on many NVIDIA setups
cursor {
    no_hardware_cursors = true
}

# =============================================================================
# Workspace → Monitor assignments
# Mirrors AeroSpace workspace-to-monitor-force-assignment:
#   DP-1     ← main / AOC AG49 (5120x1440)
#   HDMI-A-1 ← secondary / LG (2560x1080)
# =============================================================================
workspace = 1,       monitor:DP-1
workspace = 2,       monitor:HDMI-A-1
workspace = 3,       monitor:DP-1
workspace = 4,       monitor:DP-1
workspace = 5,       monitor:DP-1
workspace = 6,       monitor:DP-1
workspace = 7,       monitor:DP-1
workspace = 8,       monitor:DP-1
workspace = 9,       monitor:DP-1
workspace = 10,      monitor:DP-1
workspace = 11,      monitor:DP-1
workspace = name:A,  monitor:DP-1
workspace = name:B,  monitor:DP-1
workspace = name:C,  monitor:DP-1
workspace = name:D,  monitor:DP-1
workspace = name:E,  monitor:DP-1
workspace = name:G,  monitor:DP-1
workspace = name:I,  monitor:DP-1
workspace = name:M,  monitor:HDMI-A-1
workspace = name:N,  monitor:DP-1
workspace = name:O,  monitor:DP-1
workspace = name:P,  monitor:DP-1
workspace = name:Q,  monitor:DP-1
workspace = name:R,  monitor:DP-1
workspace = name:S,  monitor:DP-1
workspace = name:T,  monitor:DP-1
workspace = name:U,  monitor:DP-1
workspace = name:V,  monitor:DP-1
workspace = name:W,  monitor:HDMI-A-1
workspace = name:X,  monitor:DP-1

# =============================================================================
# Keybindings — mirrors AeroSpace bindings
# =============================================================================
$mod = ALT

# Focus (vim-style, matches alt-h/j/k/l)
bind = $mod, H, movefocus, l
bind = $mod, J, movefocus, d
bind = $mod, K, movefocus, u
bind = $mod, L, movefocus, r

# Move window (vim-style, matches alt-shift-h/j/k/l)
bind = $mod SHIFT, H, movewindow, l
bind = $mod SHIFT, J, movewindow, d
bind = $mod SHIFT, K, movewindow, u
bind = $mod SHIFT, L, movewindow, r

# Resize (matches alt-shift-minus / alt-shift-equal)
bind = $mod SHIFT, minus, resizeactive, -80 0
bind = $mod SHIFT, equal, resizeactive,  80 0

# Fullscreen (matches alt-f)
bind = $mod, F, fullscreen, 0

# Toggle floating (service mode: alt-shift-semicolon → f in AeroSpace)
bind = $mod SHIFT, F, togglefloating

# Back-and-forth (matches alt-tab)
bind = $mod, TAB, workspace, previous

# Move current workspace to next monitor (matches alt-shift-tab)
bind = $mod SHIFT, TAB, movecurrentworkspacetomonitor, +1

# App launcher
bind = $mod, SPACE, exec, wofi --show drun

# Terminal
bind = $mod, RETURN, exec, ghostty

# Close window
bind = $mod, X, killactive
bind = $mod SHIFT, Q, killactive

# Lock screen
bind = $mod SHIFT, L, exec, loginctl lock-session

# Exit Hyprland
bind = $mod SHIFT, E, exit

# --- Workspace switching — numbers ---
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, Y, workspace, 10   # alt-y = workspace 10
bind = $mod, Z, workspace, 11   # alt-z = workspace 11

# --- Workspace switching — letters ---
bind = $mod, A, workspace, name:A
bind = $mod, B, workspace, name:B
bind = $mod, C, workspace, name:C
bind = $mod, D, workspace, name:D
bind = $mod, E, workspace, name:E
bind = $mod, G, workspace, name:G
bind = $mod, I, workspace, name:I
bind = $mod, M, workspace, name:M
bind = $mod, N, workspace, name:N
bind = $mod, O, workspace, name:O
bind = $mod, P, workspace, name:P
bind = $mod, Q, workspace, name:Q
bind = $mod, R, workspace, name:R
bind = $mod, S, workspace, name:S
bind = $mod, T, workspace, name:T
bind = $mod, U, workspace, name:U
bind = $mod, V, workspace, name:V
bind = $mod, W, workspace, name:W


# --- Move window to workspace — numbers ---
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, Y, movetoworkspace, 10
bind = $mod SHIFT, Z, movetoworkspace, 11

# --- Move window to workspace — letters ---
bind = $mod SHIFT, A, movetoworkspace, name:A
bind = $mod SHIFT, B, movetoworkspace, name:B
bind = $mod SHIFT, C, movetoworkspace, name:C
bind = $mod SHIFT, D, movetoworkspace, name:D
bind = $mod SHIFT, E, movetoworkspace, name:E
bind = $mod SHIFT, G, movetoworkspace, name:G
bind = $mod SHIFT, I, movetoworkspace, name:I
bind = $mod SHIFT, M, movetoworkspace, name:M
bind = $mod SHIFT, N, movetoworkspace, name:N
bind = $mod SHIFT, O, movetoworkspace, name:O
bind = $mod SHIFT, P, movetoworkspace, name:P
bind = $mod SHIFT, Q, movetoworkspace, name:Q
bind = $mod SHIFT, R, movetoworkspace, name:R
bind = $mod SHIFT, S, movetoworkspace, name:S
bind = $mod SHIFT, T, movetoworkspace, name:T
bind = $mod SHIFT, U, movetoworkspace, name:U
bind = $mod SHIFT, V, movetoworkspace, name:V
bind = $mod SHIFT, W, movetoworkspace, name:W


# --- Media & Volume keys ---
# bindel allows the key to repeat while held (good for volume)
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind   = , XF86AudioMute,        exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind   = , XF86AudioMicMute,     exec, wpctl set-mute @DEFAULT_SOURCE@ toggle
bind   = , XF86AudioPlay,        exec, playerctl play-pause
bind   = , XF86AudioNext,        exec, playerctl next
bind   = , XF86AudioPrev,        exec, playerctl previous

# --- Screenshots ---
# Print       → full screen saved to ~/Pictures/screenshots/
# ALT+Print   → select region → copy to clipboard
bind = , Print,       exec, ~/.config/hypr/scripts/screenshot.sh full
bind = $mod, Print,   exec, ~/.config/hypr/scripts/screenshot.sh region

# =============================================================================
# Window rules
# New API (Hyprland 0.40+): windowrule = match:class ^(...)$, rule
# The old windowrulev2 syntax is deprecated as of 0.41.x
# =============================================================================
windowrule = match:class ^(blueman-manager)$,      float on
windowrule = match:class ^(nm-connection-editor)$, float on
windowrule = match:class ^(pavucontrol)$,          float on
windowrule = match:class ^(org\.gnome\.Nautilus)$, match:title ^(Properties)$, float on

# Picture-in-picture: float and pin above all workspaces
windowrule = match:title ^([Pp]icture.in.[Pp]icture)$, float on
windowrule = match:title ^([Pp]icture.in.[Pp]icture)$, pin on

# Idle inhibit — don't sleep while a fullscreen app is running
windowrule = match:fullscreen 1, idle_inhibit fullscreen

# =============================================================================
# App → Workspace assignments
# Find unknown class names with: hyprctl clients | grep class
# =============================================================================

# Browsers → B
windowrule = match:class ^(google-chrome|chromium-browser|firefox|firefox_firefox|brave-browser|microsoft-edge|vivaldi-stable)$, workspace name:B

# Chat apps → C
windowrule = match:class ^(Signal|discord|telegram-desktop|whatsapp-for-linux|Slack|slack)$, workspace name:C

# Music → M
windowrule = match:class ^(Spotify|spotify|com\.spotify\.Client)$, workspace name:M

# Terminals → T
windowrule = match:class ^(com\.mitchellh\.ghostty|ghostty|org\.wezfurlong\.wezterm|kitty|Alacritty|foot)$, workspace name:T

# Notes → N
windowrule = match:class ^(anytype|obsidian|Obsidian|notion-app|Notion)$, workspace name:N
