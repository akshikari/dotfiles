# Window rules — app to workspace assignments
# https://wiki.hyprland.org/Configuring/Window-Rules/

# Terminal → T
windowrulev2 = workspace name:T, class:^(org\.wezfurlong\.wezterm)$

# Browser → B
windowrulev2 = workspace name:B, class:^(google-chrome|chromium|firefox|brave-browser)$

# Chat → C
windowrulev2 = workspace name:C, class:^(Signal|discord|telegram-desktop|whatsapp-for-linux)$

# Dev → D
windowrulev2 = workspace name:D, class:^(code|code-url-handler|Code)$

# Gaming → G
windowrulev2 = workspace name:G, class:^(steam|Steam)$

# Music → M
windowrulev2 = workspace name:M, class:^(Spotify|spotify)$

# Notes → N
windowrulev2 = workspace name:N, class:^(notion-app|Notion|obsidian|anytype)$

# Float picture-in-picture windows
windowrulev2 = float, title:^([Pp]icture.in.[Pp]icture)$
windowrulev2 = pin,   title:^([Pp]icture.in.[Pp]icture)$
