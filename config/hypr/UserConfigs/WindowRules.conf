# Window rules — app to workspace assignments
# https://wiki.hyprland.org/Configuring/Window-Rules/

# Terminal → T
windowrule = match:class ^(org\.wezfurlong\.wezterm)$, workspace name:T

# Browser → B
windowrule = match:class ^(google-chrome|chromium|firefox|brave-browser)$, workspace name:B

# Chat → C
windowrule = match:class ^(Signal|discord|telegram-desktop|whatsapp-for-linux)$, workspace name:C

# Dev → D
windowrule = match:class ^(code|code-url-handler|Code)$, workspace name:D

# Gaming → G
windowrule = match:class ^(steam|Steam)$, workspace name:G

# Music → M
windowrule = match:class ^(Spotify|spotify)$, workspace name:M

# Notes → N
windowrule = match:class ^(notion-app|Notion|obsidian|anytype)$, workspace name:N

# Float picture-in-picture windows
windowrule = match:title ^([Pp]icture.in.[Pp]icture)$, float on
windowrule = match:title ^([Pp]icture.in.[Pp]icture)$, pin on
