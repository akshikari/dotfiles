general {
    lock_cmd         = pidof hyprlock || hyprlock  # don't spawn multiple instances
    before_sleep_cmd = loginctl lock-session        # lock before suspend
    after_sleep_cmd  = hyprctl dispatch dpms on && pkill hyprpaper; pkill waybar; hyprpaper & waybar &  # restart clients to fix VRAM corruption on NVIDIA resume
    inhibit_sleep    = 3                            # hold sleep inhibitor 3s so hyprlock renders before GPU suspends
}

# 9:30 — warning notification
listener {
    timeout = 570
    on-timeout = notify-send "Locking soon" "Screen locks in 30 seconds" --urgency=normal --expire-time=28000
    on-resume   = true
}

# 10:00 — lock screen
listener {
    timeout = 600
    on-timeout = loginctl lock-session
}

# 15:00 — suspend
listener {
    timeout = 900
    on-timeout = systemctl suspend
}

