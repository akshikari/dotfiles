general {
    lock_cmd        = pidof hyprlock || hyprlock  # don't spawn multiple instances
    before_sleep_cmd = loginctl lock-session       # lock before suspend
    after_sleep_cmd  = hyprctl dispatch dpms on    # turn monitors back on after wake
}

# 9:30 — warning notification
listener {
    timeout = 570
    on-timeout = notify-send "Locking soon" "Screen locks in 30 seconds" --urgency=normal --expire-time=28000
    on-resume   = true
}

# 10:00 — lock screen
listener {
    timeout = 600
    on-timeout = loginctl lock-session
}

# 11:00 — monitors off (1 min after lock)
listener {
    timeout = 660
    on-timeout = hyprctl dispatch dpms off
    on-resume   = hyprctl dispatch dpms on
}

# 1 hour — suspend
listener {
    timeout = 3600
    on-timeout = systemctl suspend
}

