# Workspace rules
# https://wiki.hyprland.org/Configuring/Workspace-Rules/
#
# Monitor bindings are commented out until you can identify your monitor names.
# Once inside Hyprland, run: hyprctl monitors
# Then fill in the desc: values and uncomment the monitor bindings.
# Use desc: prefix to match by description (more stable than connector names like DP-1).
# Example: workspace = name:T, monitor:desc:AOC U4924XA, default:true
#
# Monitor 0 = AOC 49" (primary), monitor 1 = LG 34" (secondary)

# === Numbered workspaces ===
# workspace = 1, monitor:desc:TODO_AOC_DESC
# workspace = 2, monitor:desc:TODO_LG_DESC
# workspace = 3, monitor:desc:TODO_AOC_DESC
# workspace = 4, monitor:desc:TODO_LG_DESC
# workspace = 5, monitor:desc:TODO_AOC_DESC
# workspace = 6, monitor:desc:TODO_LG_DESC
# workspace = 7, monitor:desc:TODO_AOC_DESC
# workspace = 8, monitor:desc:TODO_LG_DESC
# workspace = 9, monitor:desc:TODO_AOC_DESC

# === Named workspaces (monitor bindings to fill in after: hyprctl monitors) ===
workspace = name:A
workspace = name:B   # , monitor:desc:TODO_AOC_DESC
workspace = name:C   # , monitor:desc:TODO_LG_DESC
workspace = name:D   # , monitor:desc:TODO_AOC_DESC
workspace = name:E
workspace = name:G   # , monitor:desc:TODO_AOC_DESC
workspace = name:I
workspace = name:M   # , monitor:desc:TODO_LG_DESC
workspace = name:N
workspace = name:O
workspace = name:P
workspace = name:Q
workspace = name:R
workspace = name:S
workspace = name:T   # , monitor:desc:TODO_AOC_DESC, default:true
workspace = name:U
workspace = name:V
workspace = name:W
workspace = name:Y
workspace = name:Z
