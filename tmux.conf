# Status
set -g status-interval 1
set -g escape-time 10
set -g repeat-time 350
set -g display-time 1500
set -g prefix C-a

# Terminal colors
set -g default-terminal "tmux-256color"
set -sag terminal-features ",*:RGB"
set -sag terminal-features ",*:usstyle"

# Enable gapeless window
set -g renumber-windows on

# Make index start from 1
set -g base-index 1
setw -g pane-base-index 1

# Set focus events on for nvim
set -g focus-events on

# Bind tmux command prefix to Ctrl+a
unbind C-b
bind-key C-a send-prefix

unbind %
bind | split-window -h

unbind '"'
bind - split-window -v

unbind r
bind r source-file ~/.tmux.conf; display-message "~/.tmux.conf reloaded"

bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5

bind -r m resize-pane -Z

set -g mouse on

set-window-option -g mode-keys vi

bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection

unbind -T copy-mode-vi MouseDragEnd1Pane

# Allow Ctrl+1-9 to pass through to applications
bind-key -n C-1 send-keys C-1
bind-key -n C-2 send-keys C-2
bind-key -n C-3 send-keys C-3
bind-key -n C-4 send-keys C-4
bind-key -n C-5 send-keys C-5
bind-key -n C-6 send-keys C-6
bind-key -n C-7 send-keys C-7
bind-key -n C-8 send-keys C-8
bind-key -n C-9 send-keys C-9

# TPM
set -g @plugin 'tmux-plugins/tpm'
# bind-key k send-keys C-l \; clear-history
# bind-key -n C-g send-keys C-c "clear && tmux clear-history" Enter
# bind-key -n C-g send-keys C-l \; clear-history
bind-key -n C-g send-keys C-c C-l \; run-shell "sleep 0.1" \; clear-history
# List of tmux plugins
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-logging'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'b0o/tmux-autoreload'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'jaclu/tmux-menus'

# Catppuccin theme setup
set -g @catppuccin_flavor 'frappe'
set -g @catppuccin_window_status_style "basic"
set -g @catppuccin_pane_status_enabled "off"
set -g @catppuccin_pane_border_status "off"

# Style
## status left look and feel
set -g status-left-length 80
set -g status-left ""

## status right look and feel
set -g status-right-length 160
set -g status-right ""

## status right modules
set -ga status-right "#[fg=#{@thm_green}]#{?client_prefix,#[fg=#{@thm_red}]#[reverse]#[bold],} 󰕮 #S #[none]"
set -ga status-right "#{E:#{@custom_status_separator}}"

set -ga status-right "#[fg=#{@thm_maroon}] 󰆍 #{pane_current_command} "
set -ga status-right "#{E:#{@custom_status_separator}}"

set -ga status-right "#[fg=#{@thm_blue}] 󰉋 #{b:pane_current_path} "
set -ga status-right "#{E:#{@custom_status_separator}}"

set -ga status-right "#{?window_zoomed_flag,#[fg=#{@thm_yellow}] 󰁌 zoom ,}"
set -ga status-right "#{?window_zoomed_flag,#{E:#{@custom_status_separator}},}"

set -ga status-right "#{?pane_marked,#[fg=#{@thm_yellow}] 󰈻 marked ,}"
set -ga status-right "#{?pane_marked,#{E:#{@custom_status_separator}},}"

set -ga status-right "#[fg=#{@thm_pink}] 󰌢 #h "
set -ga status-right "#{E:#{@custom_status_separator}}"

set -ga status-right "#[fg=#{@thm_lavender}] 󰃰 %Y-%m-%d %H:%M:%S "

## status right separator
set -g @custom_status_separator "#[fg=#{@thm_surface_2},bg=default,none]│"

set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'

# Bootstrap tpm
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

# Configure Tmux
set -g status-position top
set -g status-style "bg=#{@thm_mantle}"
set -g status-justify "left"

set -g status 2
set -g status-format[1] "\
#[fg=#{@thm_surface_0},bg=#{@thm_bg}]\
#(tmux display-message -p \"#{window_width}\"\
 | xargs seq -s \"━\" 0\
 | tr -d \"[:digit:]\")\
"

# pane border look and feel
setw -g pane-border-status off
setw -g pane-border-format ""
setw -g pane-active-border-style "bg=default,fg=#{@thm_peach}"
setw -g pane-border-style "bg=default,fg=#{@thm_overlay_1}"
setw -g pane-border-lines single

# window look and feel
set -wg automatic-rename on
set -g automatic-rename-format "window"

# window status format
set -gF window-status-separator "#[fg=#{@thm_surface_2}]"
set -g window-status-format " #{?#{==:#{window_name},window},#I,#W} "
set -g window-status-style "fg=#{@thm_rosewater},bg=default"
set -g window-status-last-style "fg=#{@thm_peach}"
set -g window-status-activity-style "fg=#{@thm_red},bold"
set -g window-status-bell-style "fg=#{@thm_red},bold"

# window status current format
set -g window-status-current-format " #{?#{==:#{window_name},window},#I,#W} "
set -g window-status-current-style "fg=#{@thm_peach},bg=default,bold,reverse"

# Few Personal Key Mappings
# Free any global Ctrl-h/j/k/l that plugins might set
unbind -n C-h; unbind -n C-j; unbind -n C-k; unbind -n C-l
unbind -T copy-mode-vi C-h; unbind -T copy-mode-vi C-j; unbind -T copy-mode-vi C-k; unbind -T copy-mode-vi C-l

# decode Ctrl+Arrows etc.
set -g xterm-keys on

# 1) Disable tmux’s decoders so raw sequences reach user-keys
set -g xterm-keys off
set -g extended-keys off
set -gu extended-keys-format
# remove extkeys from terminal-features if set
set -gu terminal-features
# (re-add your RGB/usstyle lines if needed)
set -sag terminal-features ",*:RGB"
set -sag terminal-features ",*:usstyle"

# 2) Keep your user-keys
set -s user-keys[0] "\e[1;5D"   # C-Left
set -s user-keys[1] "\e[1;5C"   # C-Right
set -s user-keys[2] "\e[1;5A"   # C-Up
set -s user-keys[3] "\e[1;5B"   # C-Down
set -s user-keys[4] "\e[27;5;13~"
# (and keep it UNBOUND so it passes through)
unbind -n User4

# 3) Bind them (no prefix)
bind -n User0 select-pane -L
bind -n User1 select-pane -R
bind -n User2 select-pane -U
bind -n User3 select-pane -D

# For compatibility with iTerm2's tmux integration
setw -g aggressive-resize off
